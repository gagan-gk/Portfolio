const catMap={'about.txt':'about','skills.db':'skills','experience.log':'experience','projects':'projects','projects/':'projects','certs.json':'certs','contact.conf':'contact','secrets.enc':'secrets'};
const allKeys=Object.keys(cmds).concat(Object.keys(catMap).map(k=>'cat '+k));

let hist=[],hidx=-1;
const ci=document.getElementById('ci');

ci.addEventListener('keydown',async e=>{
  if(e.key==='Enter'){
    const raw=ci.value.trim();
    if(!raw)return;
    hist.unshift(raw);hidx=-1;
    p(`<span class="od">Gagan_Kumar@cloud-bastion:~$</span> <span class="oc">${raw}</span>`);
    ci.value='';
    let key=raw.toLowerCase();
    if(key.startsWith('cat ')){const f=key.slice(4).trim();key=catMap[f]||'__unknown__';}
    const fn=cmds[key];
    if(fn)await fn();
    else{br();p(`<span class="oe">bash: ${raw}: command not found</span>`);p(`<span class="od">Type <span class="oc">help</span> to see commands</span>`);br();}
    out.scrollTop=out.scrollHeight;
  }
  if(e.key==='ArrowUp'){e.preventDefault();if(hidx<hist.length-1){hidx++;ci.value=hist[hidx];}}
  if(e.key==='ArrowDown'){e.preventDefault();if(hidx>0){hidx--;ci.value=hist[hidx];}else{hidx=-1;ci.value='';}}
  if(e.key==='Tab'){e.preventDefault();const part=ci.value.toLowerCase();const m=allKeys.find(c=>c.startsWith(part));if(m)ci.value=m;}
});
